<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NPTE Study">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>NPTE-PT Study</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f172a;--bg2:#1e293b;--bg3:#334155;
  --accent:#3b82f6;--accent2:#60a5fa;
  --success:#22c55e;--success-bg:#052e16;
  --danger:#ef4444;--danger-bg:#2d0707;
  --warn:#f59e0b;--warn-bg:#1c0a00;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --border:#334155;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.home-header{padding:20px 18px 14px;background:linear-gradient(160deg,#0f172a,#1a2f50);flex-shrink:0}
.home-title{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.home-sub{font-size:12px;color:var(--text2);margin-top:3px}
.home-stats{display:flex;gap:7px;margin-top:11px;flex-wrap:wrap}
.stat-pill{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);
  border-radius:20px;padding:3px 10px;font-size:11px;color:var(--accent2)}
.stat-pill.btn{cursor:pointer}
.filter-section{padding:0 16px 16px;overflow-y:auto;flex:1}
.filter-label{font-size:10px;font-weight:700;color:var(--text3);
  letter-spacing:.09em;text-transform:uppercase;margin:15px 0 8px}
.mode-tabs{display:flex;gap:6px;margin-top:13px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.mode-tabs::-webkit-scrollbar{display:none}
.mode-tab{flex:0 0 auto;padding:7px 14px;border:1px solid var(--border);border-radius:20px;
  background:var(--bg2);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .15s}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.cat-btn{background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;
  padding:14px 12px;cursor:pointer;transition:all .15s;text-align:left;position:relative}
.cat-btn.selected{border-color:var(--accent);background:rgba(59,130,246,.12)}
.cat-btn .em{font-size:22px;display:block;margin-bottom:5px}
.cat-btn .nm{font-size:13px;font-weight:600;color:var(--text);line-height:1.4;word-break:keep-all}
.cat-btn .ct{font-size:11px;color:var(--text3);margin-top:3px}
.cat-btn .ck{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;
  background:var(--accent);display:none;align-items:center;justify-content:center;font-size:10px;color:#fff}
.cat-btn.selected .ck{display:flex}
.chip-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 12px;border:1px solid var(--border);border-radius:20px;background:var(--bg2);
  color:var(--text2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip.selected{border-color:var(--accent);background:rgba(59,130,246,.15);color:var(--accent2)}
.start-bar{padding:13px 16px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.btn-start{width:100%;padding:15px;background:var(--accent);border:none;border-radius:var(--radius);
  color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-start:disabled{opacity:.3;cursor:not-allowed}
.timer-wrap{padding:10px 16px 0;background:var(--bg2);flex-shrink:0}
.timer-track{height:10px;background:var(--bg3);border-radius:5px;position:relative;overflow:hidden}
.timer-fill{height:100%;border-radius:5px;transition:width .5s linear,background .5s}
.timer-track.timeout{background:transparent;border:1.5px solid var(--text3)}
.timeout-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--text3)}
.quiz-header{background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.quiz-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px}
.btn-back{background:none;border:none;color:var(--text2);font-size:14px;cursor:pointer}
.quiz-meta{display:flex;align-items:center;gap:10px}
.quiz-info{font-size:12px;color:var(--text2)}
.btn-translate{padding:5px 10px;border:1px solid var(--border);border-radius:20px;
  background:var(--bg3);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn-translate.active{border-color:var(--warn);color:var(--warn);background:var(--warn-bg)}
.progress-bar{height:2px;background:var(--bg3);margin:0 16px 10px}
.progress-fill{height:100%;background:var(--accent);transition:width .3s}
.quiz-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.q-source{font-size:10px;color:var(--text3);margin-bottom:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.q-stem{font-size:17px;line-height:1.7;color:var(--text);margin-bottom:14px}
.vw{border-bottom:1px dashed rgba(126,184,247,.6);cursor:pointer;color:inherit}
.q-media{margin-bottom:14px;border-radius:var(--radius-sm);overflow:hidden;background:var(--bg3);display:none}
.q-media.show{display:block}
.q-media img{width:100%;height:auto;display:block;cursor:zoom-in}
.q-media iframe{width:100%;aspect-ratio:16/9;height:auto;border:none;display:block}
.q-media-link{display:flex;align-items:center;gap:8px;padding:14px;color:var(--accent2);font-size:14px;text-decoration:none}
.options{display:flex;flex-direction:column;gap:9px}
.opt-btn{width:100%;padding:14px;border:1.5px solid var(--border);border-radius:var(--radius);
  background:var(--bg2);color:var(--text);font-size:17px;line-height:1.55;
  cursor:pointer;text-align:left;transition:border-color .15s,background .15s;
  display:flex;align-items:flex-start;gap:10px}
.opt-btn:active{transform:scale(.99)}
.opt-num{min-width:24px;height:24px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;
  color:var(--text2);flex-shrink:0;margin-top:2px}
.opt-text{flex:1}
.opt-btn.correct{border-color:var(--success);background:var(--success-bg)}
.opt-btn.correct .opt-num{background:var(--success);color:#fff}
.opt-btn.correct .opt-text{color:var(--success)}
.opt-btn.wrong{border-color:var(--danger);background:var(--danger-bg)}
.opt-btn.wrong .opt-num{background:var(--danger);color:#fff}
.opt-btn.wrong .opt-text{color:#f87171}
.opt-btn:disabled{cursor:default}
.opt-btn:not(.correct):not(.wrong):disabled{opacity:.45}
.post-answer{margin-top:14px;display:none}
.post-answer.show{display:block}
.explain-btn{display:flex;align-items:center;gap:7px;padding:13px 16px;
  background:rgba(59,130,246,.1);border:1px solid var(--accent);border-radius:var(--radius-sm);
  color:var(--accent2);font-size:15px;cursor:pointer;text-decoration:none;
  width:100%;justify-content:center;font-weight:500}
.quiz-footer{padding:11px 16px;background:var(--bg2);border-top:1px solid var(--border);
  display:flex;gap:9px;align-items:center;flex-shrink:0}
.btn-bm{padding:10px;background:var(--bg3);border:none;border-radius:var(--radius-sm);
  color:var(--text2);font-size:17px;cursor:pointer;flex-shrink:0}
.btn-bm.on{color:var(--warn)}
.btn-next{flex:1;padding:13px;background:var(--bg3);border:none;border-radius:var(--radius);
  color:var(--text3);font-size:15px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-next.ready{background:var(--accent);color:#fff}
#result{background:var(--bg);align-items:center;justify-content:center;padding:24px 20px}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:28px 22px;width:100%;max-width:380px;text-align:center}
.res-score{font-size:52px;font-weight:700;color:var(--accent2);letter-spacing:-2px}
.res-label{font-size:13px;color:var(--text2);margin-top:4px}
.res-bars{display:flex;flex-direction:column;gap:10px;margin:22px 0}
.bar-row{display:flex;align-items:center;gap:10px;font-size:12px}
.bar-lbl{width:56px;text-align:right;color:var(--text2)}
.bar-track{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.bfc{height:100%;background:var(--success);border-radius:4px}
.bfw{height:100%;background:var(--danger);border-radius:4px}
.bar-num{width:30px;font-size:12px;font-weight:600}
.res-btns{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.rbtn{padding:13px;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer}
.rbtn.primary{background:var(--accent);color:#fff}
.rbtn.secondary{background:var(--bg3);color:var(--text2)}
.rbtn.danger{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid var(--danger)}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:200}
.loader{width:40px;height:40px;border:3px solid var(--bg3);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-title{font-size:16px;font-weight:600;color:var(--text)}
.load-sub{font-size:13px;color:var(--text2);text-align:center;padding:0 32px;line-height:1.6;white-space:pre-line}

.btn-prev{padding:10px 14px;background:var(--bg3);border:none;border-radius:var(--radius-sm);
  color:var(--text2);font-size:15px;cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-prev:disabled{opacity:.3;cursor:not-allowed}
.btn-skip{padding:10px 14px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);
  border-radius:var(--radius-sm);color:var(--warn);font-size:13px;font-weight:600;
  cursor:pointer;flex-shrink:0;transition:all .15s}
.btn-skip.skipped{background:rgba(245,158,11,.3);border-color:var(--warn)}
.btn-end{padding:10px 14px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);
  border-radius:var(--radius-sm);color:var(--danger);font-size:13px;font-weight:600;
  cursor:pointer;flex-shrink:0}
/* Skip 관리 화면 */
#skip-screen{position:fixed;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column}
.skip-header{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.skip-header h2{font-size:16px;font-weight:700;flex:1}
.skip-list{flex:1;overflow-y:auto;padding:12px 16px}
.skip-item{display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);margin-bottom:8px;transition:border-color .15s}
.skip-item:hover{border-color:var(--accent2)}
.skip-item-label{font-size:14px;color:var(--text2)}
.skip-item-label strong{color:var(--warn);font-size:13px}
.btn-unskip{padding:6px 14px;background:rgba(239,68,68,.15);border:1px solid var(--danger);
  border-radius:20px;color:var(--danger);font-size:12px;font-weight:600;cursor:pointer}
.skip-empty{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;line-height:1.8}
/* 종료 결과 모달 */
#end-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:160;
  display:none;align-items:center;justify-content:center;padding:20px}
.end-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;
  padding:24px 20px;width:100%;max-width:360px}
.end-card h2{font-size:16px;font-weight:700;color:var(--text3);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:16px}
.end-big{font-size:42px;font-weight:800;line-height:1;text-align:center;margin:4px 0 2px}
.end-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:20px}
.end-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.end-cell{background:var(--bg3);border-radius:10px;padding:12px 14px}
.end-cell-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;margin-bottom:4px}
.end-cell-val{font-size:20px;font-weight:800;color:var(--text)}
.end-cell-val.good{color:var(--success)}
.end-cell-val.bad{color:var(--danger);font-style:italic}
.end-time-row{background:var(--bg3);border-radius:10px;padding:12px 16px;
  margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.end-time-label{font-size:12px;color:var(--text3)}
.end-time-val{font-size:15px;font-weight:700;color:var(--text)}
.end-over-row{border-radius:10px;padding:12px 16px;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center}
.end-btns{display:flex;gap:8px;margin-top:4px}
.end-btns button{flex:1;padding:13px;border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;cursor:pointer}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.cat-all-btn{grid-column:1/-1;border:2px solid var(--accent2)!important;
  background:rgba(99,102,241,.08)!important;display:flex!important;
  align-items:center;gap:12px;padding:14px 16px!important}
.cat-all-btn .em{font-size:24px!important;margin:0!important;display:inline!important}
.cat-all-btn .nm{font-size:14px!important;font-weight:700!important}
.cat-all-btn.selected{background:rgba(59,130,246,.25)!important;border-color:var(--accent)!important}
.sub-chips{display:flex;flex-wrap:wrap;gap:5px;padding:8px 0 4px;margin-top:6px;border-top:1px solid var(--border)}
.sub-chip{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;
  background:var(--bg3);color:var(--text3);border:1px solid var(--border);transition:all .15s}
.sub-chip.sub-all{background:var(--accent);color:#fff;border-color:var(--accent)}
.sub-chip.sub-on{background:var(--accent2);color:#fff;border-color:var(--accent2)}
</style>
</head>
<body>

<div id="pw-screen" style="position:fixed;inset:0;background:#0f1117;z-index:9999;
  display:flex;align-items:center;justify-content:center;flex-direction:column;padding:30px">

  <!-- 비밀번호 입력 -->
  <div id="pw-main" style="width:100%;max-width:320px">
    <div style="text-align:center;margin-bottom:32px">
      <div style="font-size:40px;margin-bottom:12px">🔒</div>
      <div style="font-size:22px;font-weight:800;color:#e8eaf6;margin-bottom:6px">NPTE-PT Study</div>
      <div style="font-size:13px;color:#546e7a">비밀번호를 입력하세요</div>
    </div>
    <input id="pw-input" type="password" placeholder="Password"
      style="width:100%;padding:14px 16px;background:#1e2035;border:1.5px solid #2a2d4a;
      border-radius:12px;color:#e8eaf6;font-size:16px;text-align:center;
      letter-spacing:.2em;margin-bottom:12px;box-sizing:border-box;outline:none"
      onkeydown="if(event.key==='Enter')checkPw()">
    <button id="pw-btn" onclick="checkPw()"
      style="width:100%;padding:14px;background:#3949ab;border:none;border-radius:12px;
      color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px">
      입장
    </button>
    <div id="pw-error" style="text-align:center;color:#ef5350;font-size:13px;
      min-height:20px;opacity:0;transition:opacity .2s"></div>
  </div>

  <!-- 지문 인증 대기 화면 -->
  <div id="pw-bio-waiting" style="display:none;flex-direction:column;align-items:center;
    width:100%;max-width:320px">
    <div style="font-size:56px;margin-bottom:20px;animation:pulse 1.5s infinite">👆</div>
    <div style="font-size:18px;font-weight:700;color:#e8eaf6;margin-bottom:8px">지문/얼굴 인식 중</div>
    <div style="font-size:13px;color:#546e7a;margin-bottom:28px">기기의 생체인식을 사용하세요</div>
    <button onclick="resetBiometric()"
      style="padding:10px 24px;background:transparent;border:1px solid #2a2d4a;
      border-radius:20px;color:#546e7a;font-size:13px;cursor:pointer">
      비밀번호로 입장
    </button>
  </div>
</div>

<!-- 지문 등록 제안 (별도 전체화면) -->
<div id="pw-biometric-offer" style="display:none;position:fixed;inset:0;background:#0f1117;
  z-index:9999;align-items:center;justify-content:center;flex-direction:column;padding:30px">
  <div style="width:100%;max-width:320px;text-align:center">
    <div style="font-size:56px;margin-bottom:16px">👆</div>
    <div style="font-size:20px;font-weight:800;color:#e8eaf6;margin-bottom:8px">지문/얼굴인식 등록</div>
    <div style="font-size:13px;color:#546e7a;line-height:1.7;margin-bottom:28px">
      다음부터 비밀번호 없이<br>생체인식으로 바로 입장할 수 있습니다
    </div>
    <button onclick="registerBiometric()"
      style="width:100%;padding:14px;background:#1b5e20;border:none;border-radius:12px;
      color:#a5d6a7;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px">
      👆 지문/얼굴인식 등록
    </button>
    <button onclick="skipBiometric()"
      style="width:100%;padding:14px;background:transparent;border:1px solid #2a2d4a;
      border-radius:12px;color:#546e7a;font-size:14px;cursor:pointer">
      건너뛰기
    </button>
  </div>
</div>

<!-- ═══ Skip 관리 화면 ═══ -->
<div id="skip-screen">
  <div class="skip-header">
    <button onclick="closeSkipScreen()" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">←</button>
    <h2>⏭ Skipped 문제</h2>
    <span id="skip-count" style="font-size:12px;color:var(--text3)"></span>
  </div>
  <div class="skip-list" id="skip-list"></div>
</div>

<!-- ═══ 종료 결과 모달 ═══ -->
<div id="end-modal">
  <div class="end-card">
    <h2>📊 Session Result</h2>
    <div class="end-big" id="em-score">—</div>
    <div class="end-sub" id="em-acc">—</div>
    <div class="end-grid">
      <div class="end-cell">
        <div class="end-cell-label">✅ 정답</div>
        <div class="end-cell-val good" id="em-cor">—</div>
      </div>
      <div class="end-cell">
        <div class="end-cell-label">❌ 오답</div>
        <div class="end-cell-val bad" id="em-wrg">—</div>
      </div>
      <div class="end-cell">
        <div class="end-cell-label">📖 읽은 문제</div>
        <div class="end-cell-val" id="em-seen">—</div>
      </div>
      <div class="end-cell">
        <div class="end-cell-label">⏱ 문제당 평균</div>
        <div class="end-cell-val" id="em-avg">—</div>
      </div>
    </div>
    <div class="end-time-row">
      <div>
        <div class="end-time-label">총 풀이 시간</div>
        <div class="end-time-val" id="em-elapsed">—</div>
      </div>
      <div style="text-align:right">
        <div class="end-time-label">기준 시간 (×80초)</div>
        <div class="end-time-val" id="em-base">—</div>
      </div>
    </div>
    <div class="end-over-row" id="em-over-row">
      <div class="end-time-label" id="em-over-label">초과/여유</div>
      <div class="end-time-val" id="em-over">—</div>
    </div>
    <div class="end-btns">
      <button onclick="closeEndModal()" style="background:var(--bg3);color:var(--text2)">계속 풀기</button>
      <button onclick="closeEndModal();goHome()" style="background:var(--accent);color:#fff">홈으로</button>
    </div>
  </div>
</div>

<!-- 단어 말풍선 -->
<div id="vocab-bubble" onclick="event.stopPropagation();this.style.display='none'" style="display:none;position:fixed;z-index:300;
  width:290px;background:#182840;border:1px solid #4f8ef7;
  border-radius:11px;padding:13px 15px 12px;

<script>
// ═══ 인증 (SHA-256 해시 비밀번호) ═══
const PW_KEY = 'npte_auth_v2';
const WA_KEY = 'npte_wa_cred';
// SHA-256('Oh9571@@') — 소스에 원본 비밀번호 없음
const PW_HASH = 'b72e2069566d10915bb81227921992f0f434fa3ce4c710080ab972cef60d8fea';
let _authToken = null;

async function hashPw(pw){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function checkPw(){
  const val = document.getElementById('pw-input').value.trim();
  const btn = document.getElementById('pw-btn');
  if(!val) return;
  btn.textContent = '확인 중...'; btn.disabled = true;
  const h = await hashPw(val);
  if(h === PW_HASH){
    _authToken = val;
    localStorage.setItem(PW_KEY, btoa(val + '_ok_v2'));
    document.getElementById('pw-input').value = '';
    btn.textContent = '입장'; btn.disabled = false;
    if(window.PublicKeyCredential && !localStorage.getItem(WA_KEY)){
      offerBiometric();
    } else {
      authSuccess();
    }
  } else {
    showPwError('비밀번호가 틀렸습니다');
    btn.textContent = '입장'; btn.disabled = false;
  }
}

function showPwError(msg){
  const el = document.getElementById('pw-error');
  el.textContent = msg; el.style.opacity = '1';
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').focus();
  setTimeout(()=>el.style.opacity='0', 2500);
}

function offerBiometric(){
  const panel = document.getElementById('pw-biometric-offer');
  if(panel){
    // pw-screen을 먼저 숨겨서 biometric offer 패널이 확실히 보이게
    const pws = document.getElementById('pw-screen');
    if(pws) pws.style.display = 'none';
    panel.style.display = 'flex';
  } else {
    authSuccess();
  }
}

async function registerBiometric(){
  try{
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    const cred = await navigator.credentials.create({publicKey:{
      challenge,
      rp:{name:'NPTE-PT Study'},
      user:{id: new Uint8Array(16), name:'user', displayName:'사용자'},
      pubKeyCredParams:[{type:'public-key',alg:-7},{type:'public-key',alg:-257}],
      authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
      timeout:60000
    }});
    const credId = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
    localStorage.setItem(WA_KEY, credId);
    hideBiometricOffer();
    authSuccess();
  } catch(e){
    hideBiometricOffer();
    authSuccess();
  }
}

function skipBiometric(){
  hideBiometricOffer();
  // pw-screen도 확실히 숨기기 (offerBiometric 후 pw-screen이 남아있는 경우 대비)
  const pws = document.getElementById('pw-screen');
  if(pws) pws.style.display = 'none';
  authSuccess();
}
function hideBiometricOffer(){
  const p = document.getElementById('pw-biometric-offer');
  if(p) p.style.display = 'none';
}

async function authWithBiometric(){
  const credIdStr = localStorage.getItem(WA_KEY);
  if(!credIdStr) return false;
  try{
    const credIdBytes = Uint8Array.from(atob(credIdStr), c=>c.charCodeAt(0));
    const challenge = crypto.getRandomValues(new Uint8Array(32));
    await navigator.credentials.get({publicKey:{
      challenge,
      allowCredentials:[{type:'public-key', id:credIdBytes}],
      userVerification:'required',
      timeout:60000
    }});
    return true;
  } catch(e){ return false; }
}

function authSuccess(){
  document.getElementById('pw-screen').style.display = 'none';
  loadData(true);
}

async function initAuth(){
  const saved = localStorage.getItem(PW_KEY);
  const hasWA = localStorage.getItem(WA_KEY);
  if(saved){
    try{ _authToken = atob(saved).replace('_ok_v2',''); } catch(e){ localStorage.removeItem(PW_KEY); }
  }
  if(_authToken && hasWA && window.PublicKeyCredential){
    showBioScreen();
    const ok = await authWithBiometric();
    hideBioScreen();
    if(ok){ authSuccess(); return; }
  }
  if(_authToken && !hasWA){ authSuccess(); return; }
  showPwScreen();
}

function showPwScreen(){
  document.getElementById('pw-screen').style.display = 'flex';
  document.getElementById('pw-main').style.display = 'block';
  hideBiometricOffer();
  setTimeout(()=>document.getElementById('pw-input').focus(), 150);
}
function showBioScreen(){
  document.getElementById('pw-screen').style.display = 'flex';
  document.getElementById('pw-main').style.display = 'none';
  const bs = document.getElementById('pw-bio-waiting');
  if(bs) bs.style.display = 'flex';
}
function hideBioScreen(){
  const bs = document.getElementById('pw-bio-waiting');
  if(bs) bs.style.display = 'none';
}
function resetBiometric(){
  localStorage.removeItem(WA_KEY);
  hideBioScreen();
  showPwScreen();
}

const SHEETS_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSxL_twK0WV9AXDTX6__YYFxpcfRl_kNaC6ripaS-BK3gpklyk51Qoit4azoThAT4ww3rvx880jprgU/pub?gid=1021898635&single=true&output=csv";
const VOCAB_URL="https://docs.google.com/spreadsheets/d/e/2PACX-1vSxL_twK0WV9AXDTX6__YYFxpcfRl_kNaC6ripaS-BK3gpklyk51Qoit4azoThAT4ww3rvx880jprgU/pub?gid=1703682275&single=true&output=csv";
let VOCAB=[];
const CAT_ORDER=["Musculoskeletal", "Neuromuscular", "Cardiopulmonary", "Other Systems", "Equipment & Assistive Technology", "Modalities", "Safety", "Professional Issues", "Research", "Multisystem / Differential Diagnosis"];
const CAT_EMOJI={"Musculoskeletal": "🦴", "Neuromuscular": "🧠", "Cardiopulmonary": "❤️", "Other Systems": "🩺", "Equipment & Assistive Technology": "🦽", "Modalities": "⚡", "Safety": "🚨", "Professional Issues": "📋", "Research": "🔬", "Multisystem / Differential Diagnosis": "🔍"};
const TIMER_SEC=80,STORE_KEY='npte_v5';
let ALL_QS=[],mode='cat',order='seq',sessCount=50;
let selCats=new Set(),selYears=new Set(),selSrcs=new Set();
let sessQs=[],qIdx=0,answered=false,sCorrect=0,sWrong=0,sWrongIds=[];
let translateOn=false,timerIv=null,timerLeft=0,trStem='',trOpts=[];
let sessStartTime=0,seenQIds=new Set(),sessionAnswers={};
let store={done:{},bm:new Set(),wrongs:new Set(),skip:new Set()};

if('serviceWorker' in navigator){

function renderStem(text){
  if(!VOCAB.length)return escHtml(text);
  // 텍스트를 토큰으로 분리 (단어+공백/구두점)
  const tokens=text.match(/[\w'-]+|[^\w'-]+/g)||[];
  let result='',i=0;
  while(i<tokens.length){
    const tok=tokens[i];
    if(/[\w'-]/.test(tok)){
      // 최대 5단어 숙어 매칭 시도
      let matched=false;
      for(let len=5;len>=1;len--){
        const phrase=tokens.slice(i,i+len*2-1).join('').toLowerCase().replace(/[^a-z0-9\s'-]/g,'').trim();
        const entry=VOCAB.find(v=>v.word===phrase||v.word===phrase.replace(/-/g,' '));
        if(entry){
          const display=tokens.slice(i,i+len*2-1).join('');
          result+='<span class="vw" onclick="showVocab(event,\''+escAttr(entry.word)+'\')">'+escHtml(display)+'</span>';
          i+=len*2-1;matched=true;break;
        }
      }
      if(!matched){result+=escHtml(tok);i++;}
    } else {result+=escHtml(tok);i++;}
  }
  return result;
}
function escHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(t){return t.replace(/'/g,'&#39;');}
function showVocab(e,word){
  e.stopPropagation();
  const entry=VOCAB.find(v=>v.word===word);
  if(!entry)return;
  const b=document.getElementById('vocab-bubble');
  document.getElementById('vb-word').textContent=entry.word;
  document.getElementById('vb-meaning').textContent=entry.meaning;
  document.getElementById('vb-note').textContent=entry.note;
  const crit=document.getElementById('vb-criteria');
  if(entry.criteria){crit.textContent=entry.criteria;crit.style.display='block';}
  else crit.style.display='none';
  b.style.display='block';
  const bw=290,bh=b.offsetHeight||160;
  const r=e.target.getBoundingClientRect();
  let left=r.left+(r.width/2)-(bw/2);
  let top,arrowUp=false;
  // 아래 공간 충분하면 아래에, 아니면 위에
  if(r.bottom+bh+12<window.innerHeight){top=r.bottom+10;arrowUp=true;}
  else{top=r.top-bh-10;}
  if(left+bw>window.innerWidth-8)left=window.innerWidth-bw-8;
  if(left<8)left=8;
  b.style.left=left+'px';
  b.style.top=Math.max(8,top)+'px';
  document.getElementById('vb-arrow').style.display=arrowUp?'block':'none';
  document.getElementById('vb-arrow-down').style.display=arrowUp?'none':'block';
}
document.addEventListener('click',()=>document.getElementById('vocab-bubble').style.display='none');
function parseCSV(t){
  // RFC 4180: 따옴표 안의 \n은 셀 내용으로 처리 (행 구분 아님)
  const rows=[];let cur=[],cell='',inQ=false;
  t=t.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  for(let i=0;i<t.length;i++){
    const ch=t[i],nx=t[i+1];
    if(inQ){
      if(ch==='"'&&nx==='"'){cell+='"';i++;}
      else if(ch==='"'){inQ=false;}
      else{cell+=ch;}
    }else{
      if(ch==='"'){inQ=true;}
      else if(ch===','){cur.push(cell);cell='';}
      else if(ch==='\n'){cur.push(cell);cell='';if(cur.some(c=>c))rows.push(cur);cur=[];}
      else{cell+=ch;}
    }
  }
  cur.push(cell);if(cur.some(c=>c))rows.push(cur);
  if(!rows.length)return[];
  const h=rows[0].map(k=>k.trim()),r=[];
  for(let i=1;i<rows.length;i++){const o={};h.forEach((k,j)=>o[k]=rows[i][j]||'');r.push(o);}
  return r;
}
function splitLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(c);c='';}else c+=ch;}r.push(c);return r;}
function loadStore(){try{const d=JSON.parse(localStorage.getItem(STORE_KEY)||'{}');store.done=d.done||{};store.bm=new Set((d.bm||[]).map(String));store.wrongs=new Set((d.wrongs||[]).map(String));store.skip=new Set((d.skip||[]).map(String));}catch(e){}}
function saveStore(){
  try{
    localStorage.setItem(STORE_KEY,JSON.stringify({done:store.done,bm:[...store.bm],wrongs:[...store.wrongs],skip:[...store.skip]}));
  }catch(e){}
}
function saveSession(){
  // quiz 중이면 현재 세션 상태 저장
  const screen=document.querySelector('.screen[style*="flex"],.screen:not([style*="none"])');
  const onQuiz=document.getElementById('quiz')?.style.display==='flex'||document.getElementById('quiz')?.style.display==='block';
  if(!onQuiz||!sessQs.length)return;
  try{
    localStorage.setItem('npte_session',JSON.stringify({
      qIds:sessQs.map(q=>q.id),
      qIdx,mode,order,selCats:[...selCats],selYears:[...selYears],selSrcs:[...selSrcs],
      sessCount,sCorrect,sWrong,sWrongIds,
      sessStartTime,seenQIds:[...seenQIds],
      sessionAnswers
    }));
  }catch(e){}
}
function restoreSession(){
  try{
    const d=JSON.parse(localStorage.getItem('npte_session')||'null');
    if(!d||!d.qIds||!ALL_QS.length)return false;
    const qs=d.qIds.map(id=>ALL_QS.find(q=>q.id===id)).filter(Boolean);
    if(!qs.length)return false;
    sessQs=qs;qIdx=Math.min(d.qIdx||0,qs.length-1);
    mode=d.mode||'cat';order=d.order||'seq';
    selCats=new Set(d.selCats||[]);selYears=new Set(d.selYears||[]);selSrcs=new Set(d.selSrcs||[]);
    sessCount=d.sessCount||50;
    sCorrect=d.sCorrect||0;sWrong=d.sWrong||0;sWrongIds=d.sWrongIds||[];
    sessStartTime=d.sessStartTime||Date.now();
    seenQIds=new Set((d.seenQIds||[]).map(String));
    sessionAnswers=d.sessionAnswers||{};
    answered=false;
    translateOn=false;
    return true;
  }catch(e){return false;}
}

async function loadData(forceReload=false){
  // 이미 로드됐고 강제 재로드 아니면 스킵
  if(!forceReload && ALL_QS.length>0){
    if(restoreSession()){showScreen('quiz');showQ();}
    else{showScreen('home');updateBtn();}
    // 이미 bm/wr 탭이 열려있으면 데이터 로드 후 재렌더
    if(mode==='bm'||mode==='wr')renderModeList(mode);
    return;
  }
  const ldEl=document.getElementById('loading');if(ldEl)ldEl.style.display='flex';
  const rbEl=document.getElementById('retry-btn');if(rbEl)rbEl.style.display='none';
  const lmEl=document.getElementById('load-msg');if(lmEl)lmEl.textContent='Google Sheets에서 문제를 불러오는 중…';
  try{
    const resp=await fetch(SHEETS_URL+'&t='+Date.now());
    if(!resp.ok)throw new Error('응답 오류 '+resp.status);
    const text=await resp.text();
    const rows=parseCSV(text);
    if(!rows.length)throw new Error('데이터 없음');
    ALL_QS=[];
    rows.forEach((r,i)=>{
      const stem=(r.stem||r.question||'').trim();if(!stem)return;
      ALL_QS.push({id:String(i),cat:r.cat||'',sub:r.sub||'',src:r.src||'',
        year:(r.year||(r.src||'').replace(/[^0-9]/g,'').substring(0,4)||'').toString(),
        qnum:parseInt(r.qnum||i+1)||i+1,stem,
        opts:[r.opt1||'',r.opt2||'',r.opt3||'',r.opt4||''],
        answer:Math.max(0,(parseInt(r.answer)||1)-1),
        media_url:r.media_url||'',media_type:r.media_type||'none',
        q_img:r.q_img||'',q_vid:r.q_vid||'',
        expl_url:r.explanation_url||'',
        expl_text:r.explanation||'',
        img_url:r.img||'',vid_url:r.vid||''});
    });
    // 같은 stem의 중복 문제 → 버전 목록 빌드
    // 중복 문제 감지: 같은 stem → 다른 src/qnum 정보 매핑
    const stemMap={};
    ALL_QS.forEach(q=>{
      const key=q.stem.trim().substring(0,80);
      if(!stemMap[key])stemMap[key]=[];
      stemMap[key].push({src:q.src,qnum:q.qnum,id:q.id});
    });
    ALL_QS.forEach(q=>{
      const key=q.stem.trim().substring(0,80);
      const group=stemMap[key];
      if(group.length>1){
        // 이 문제와 다른 것들만 (자기 자신 제외)
        q.dupInfo=group.filter(g=>g.id!==q.id).map(g=>'('+g.src+') Q'+g.qnum);
      } else {
        q.dupInfo=null;
      }
    });
    if(!ALL_QS.length)throw new Error('유효한 문항 없음');
    // 단어장 로드 (백그라운드)
    fetch(VOCAB_URL+'&t='+Date.now()).then(r=>r.text()).then(t=>{
      const rows=parseCSV(t);
      VOCAB=rows.filter(r=>r.word).map(r=>({
        word:(r.word||'').trim().toLowerCase(),
        meaning:r.meaning||'',
        note:r.note||'',
        criteria:r.criteria||''
      }));
      // 긴 숙어 먼저 매칭되도록 정렬
      VOCAB.sort((a,b)=>b.word.length-a.word.length);
    }).catch(()=>{});
    const ldEl2=document.getElementById('loading');if(ldEl2)ldEl2.style.display='none';
    buildCatGrid();buildYearChips();buildSrcChips();
    document.getElementById('home-sub').textContent=ALL_QS.length.toLocaleString()+' 문항 · Google Sheets 연결됨';
    updateStats();if(mode==='bm'||mode==='wr')setTimeout(()=>renderModeList(mode),100);if(restoreSession()){
      showScreen('quiz');showQ();
    } else {
      showScreen('home');updateBtn();
    }
  }catch(e){
    const lm2=document.getElementById('load-msg');if(lm2)lm2.textContent='❌ 불러오기 실패\n'+e.message+'\n\n인터넷 연결을 확인하고 다시 시도하세요.';
    const rb2=document.getElementById('retry-btn');if(rb2)rb2.style.display='block';
  }
}
function buildCatGrid(){
  var g=document.getElementById('cat-grid');
  g.innerHTML='';
  var totalCnt=ALL_QS.filter(function(q){return !store.skip.has(q.id);}).length;
  var allCard=document.createElement('div');
  allCard.className='cat-btn cat-all-btn'+(selCats.size===0?' selected':'');
  allCard.innerHTML='<span class="em">📚</span><div class="nm">All Categories</div><div class="ct">'+totalCnt+' Qs</div><div class="ck">✓</div>';
  allCard.onclick=function(){
    selCats.clear();selSubs.clear();
    document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('selected');});
    allCard.classList.add('selected');
    document.querySelectorAll('.sub-chips').forEach(function(s){s.style.display='none';});
    updateBtn();
  };
  g.appendChild(allCard);
  var cats=[...new Set(ALL_QS.map(function(q){return q.cat;}).filter(Boolean))].sort(function(a,b){
    var ia=CAT_ORDER.indexOf(a),ib=CAT_ORDER.indexOf(b);
    return (ia<0?99:ia)-(ib<0?99:ib);
  });
  cats.forEach(function(cat){
    var cnt=ALL_QS.filter(function(q){return q.cat===cat&&!store.skip.has(q.id);}).length;
    if(!cnt)return;
    var subs=CAT_SUBS[cat]||[];
    var catId='sc_'+cat.replace(/[^a-z0-9]/gi,'_');
    var d=document.createElement('div');

function toggleSub(el){

function pick(chosen,correct,q){

    sCorrect++;

  const imgW=document.getElementById('expl-img-wrap');
  const vidW=document.getElementById('expl-vid-wrap');
  const txtW=document.getElementById('expl-text-wrap');
  const empty=document.getElementById('expl-empty');
  imgW.style.display='none';vidW.style.display='none';
  txtW.style.display='none';empty.style.display='none';
  document.getElementById('expl-vid').src='';
  document.getElementById('expl-body').scrollTop=0;
  let hasAny=false;
  // 이미지
  if(q.img_url){
    document.getElementById('expl-img').src=gdImg(q.img_url);
    imgW.style.display='block';hasAny=true;
  }
  // 영상
  if(q.vid_url){
    document.getElementById('expl-vid').src=gdEmbed(q.vid_url);
    vidW.style.display='block';hasAny=true;
  }
  // 텍스트 해설 (explanation 컬럼 우선, 없으면 explanation_url)
  const textContent=q.expl_text||q.expl_url||'';
  if(textContent){
    document.getElementById('expl-text').innerHTML=textContent.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/【([^】]+)】/g,'<strong style="color:#60a5fa">【$1】</strong>').replace(/✅ ?정답/g,'<span style="color:#22c55e;font-weight:700">✅ 정답</span>').replace(/❌ ?오답/g,'<span style="color:#ef4444">❌ 오답</span>').replace(/\n/g,'<br>');
    txtW.style.display='block';hasAny=true;
  }
  if(!hasAny)empty.style.display='block';
}
function toggleImgZoom(img){

function initPinchZoom(){
  const img=document.getElementById('img-zoom-big');
  let scale=1,lastScale=1,tx=0,ty=0,lastTx=0,lastTy=0;
  let startDist=0,startTx=0,startTy=0,midX=0,midY=0;
  let dragging=false,startX=0,startY=0;
  function applyTransform(){img.style.transform='scale('+scale+') translate('+tx+'px,'+ty+'px)';}
  function dist(t){return Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);}
  function mid(t){return{x:(t[0].clientX+t[1].clientX)/2,y:(t[0].clientY+t[1].clientY)/2};}
  img.ontouchstart=e=>{
    if(e.touches.length===2){
      e.preventDefault();
      startDist=dist(e.touches);lastScale=scale;
      const m=mid(e.touches);midX=m.x;midY=m.y;
      startTx=tx;startTy=ty;
    } else if(e.touches.length===1){
      dragging=true;startX=e.touches[0].clientX-tx*scale;startY=e.touches[0].clientY-ty*scale;
    }
  };
  img.ontouchmove=e=>{
    e.preventDefault();
    if(e.touches.length===2){
      const newDist=dist(e.touches);
      scale=Math.min(Math.max(lastScale*(newDist/startDist),1),5);
      applyTransform();
    } else if(e.touches.length===1&&dragging){
      tx=(e.touches[0].clientX-startX)/scale;
      ty=(e.touches[0].clientY-startY)/scale;
      applyTransform();
    }
  };
  img.ontouchend=e=>{
    if(e.touches.length<2)dragging=false;
    if(scale<1){scale=1;tx=0;ty=0;applyTransform();}
  };
  // 더블탭 리셋
  let lastTap=0;
  img.onclick=e=>{
    const now=Date.now();
    if(now-lastTap<300){scale=1;tx=0;ty=0;applyTransform();}
    lastTap=now;
  };
}

async function toggleTranslate(){const btn=document.getElementById('btn-translate');if(translateOn){const q=sessQs[qIdx];document.getElementById('q-stem').textContent=q.stem;document.querySelectorAll('.opt-text').forEach((el,i)=>el.innerHTML=renderStem(q.opts[i]||''));translateOn=false;btn.classList.remove('active');btn.textContent='🌐 한국어';return;}btn.textContent='⏳';btn.disabled=true;const q=sessQs[qIdx];try{if(!trStem){const all=[q.stem,...q.opts.filter(Boolean)];const joined=all.map((t,i)=>'['+i+'] '+t).join('\n');const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ko&dt=t&q='+encodeURIComponent(joined);const res=await fetch(url);const data=await res.json();const raw=data[0].map(x=>x[0]).join('').split('\n');const result=[];for(const line of raw){const m=line.match(/^\[(\d+)\]\s*(.*)/);if(m)result[parseInt(m[1])]=m[2];}trStem=result[0]||q.stem;trOpts=q.opts.map((_,i)=>result[i+1]||q.opts[i]||'');}document.getElementById('q-stem').textContent=trStem;document.querySelectorAll('.opt-text').forEach((el,i)=>{if(i<trOpts.length)el.textContent=trOpts[i];});translateOn=true;btn.classList.add('active');btn.textContent='🌐 English';}catch(e){alert('번역 실패. 인터넷 연결을 확인하세요.');btn.textContent='🌐 한국어';}btn.disabled=false;}

function restoreAnswer(q,prev){
  // 이미 답한 문제 상태 복원
  answered=true;clearInterval(timerIv);
  const {chosen,correct}=prev;
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct)b.classList.add('correct');
    else if(i===chosen&&chosen!==correct)b.classList.add('wrong');
  });
  // 타이머 완료 상태
  const fill=document.getElementById('timer-fill');
  const track=document.getElementById('timer-track');
  fill.style.width='0%';fill.style.background='#ef4444';
  showPostAnswer(q);
  document.getElementById('btn-next').classList.add('ready');
  document.getElementById('quiz-body').scrollTop=0;
}

function prevQ(){if(qIdx<=0)return;clearInterval(timerIv);qIdx--;showQ();}

function toggleSkip(){
  const q=sessQs[qIdx];
  if(store.skip.has(q.id)){store.skip.delete(q.id);}
  else{store.skip.add(q.id);}
  saveStore();
  const sk=document.getElementById('btn-skip');
  sk.classList.toggle('skipped',store.skip.has(q.id));
  sk.textContent=store.skip.has(q.id)?'⏭ Skipped':'Skip';
  updateBtn();
}

function endQuiz(){
  clearInterval(timerIv);
  const elapsed=Math.floor((Date.now()-sessStartTime)/1000);
  const seenCount=Math.max(seenQIds.size,1);
  const baseSec=seenCount*80;
  const overSec=elapsed-baseSec;
  const pct=Math.round(sCorrect/seenCount*100);
  const avgSec=Math.round(elapsed/seenCount);
  function fmt(s){const m=Math.floor(Math.abs(s)/60),sec=Math.abs(s)%60;return(s<0?'-':'')+(m>0?m+'분 ':'')+sec+'초';}
  document.getElementById('em-score').textContent=sCorrect+' / '+seenCount;
  document.getElementById('em-score').style.color=pct>=70?'var(--success)':pct>=50?'var(--warn)':'var(--danger)';
  document.getElementById('em-acc').textContent=pct+'% 정답률';
  document.getElementById('em-cor').textContent=sCorrect+'문제';
  const wrgEl=document.getElementById('em-wrg');
  wrgEl.textContent=sWrong+'문제';
  document.getElementById('em-seen').textContent=seenCount+'문제';
  document.getElementById('em-avg').textContent=fmt(avgSec);
  const avgEl=document.getElementById('em-avg');
  avgEl.style.color=avgSec<=80?'var(--success)':avgSec<=100?'var(--warn)':'var(--danger)';
  document.getElementById('em-elapsed').textContent=fmt(elapsed);
  document.getElementById('em-base').textContent=fmt(baseSec);
  const overEl=document.getElementById('em-over');
  const overRow=document.getElementById('em-over-row');
  const overLabel=document.getElementById('em-over-label');
  if(overSec>0){
    overEl.textContent='+'+fmt(overSec);
    overEl.style.color='var(--danger)';
    overLabel.textContent='⚠ 초과';
    overRow.style.background='rgba(239,68,68,.1)';
  } else {
    overEl.textContent=fmt(-overSec)+' 여유!';
    overEl.style.color='var(--success)';
    overLabel.textContent='✅ 여유';
    overRow.style.background='rgba(34,197,94,.08)';
  }
  document.getElementById('end-modal').style.display='flex';
}
function closeEndModal(){document.getElementById('end-modal').style.display='none';}

function openSkipScreen(){
  const list=document.getElementById('skip-list');
  const skipped=[...store.skip];
  document.getElementById('skip-count').textContent=skipped.length+'문제';
  if(!skipped.length){
    list.innerHTML='<div class="skip-empty">⏭ Skipped 문제가 없습니다.<br><span style="font-size:12px">문제 풀이 중 Skip 버튼을 누르면 여기에 표시됩니다.</span></div>';
  } else {
    const items=ALL_QS.filter(q=>store.skip.has(q.id)).sort((a,b)=>{
      if(a.src!==b.src)return a.src.localeCompare(b.src);return a.qnum-b.qnum;
    });
    list.innerHTML=items.map(q=>
      '<div id="si-'+q.id+'" style="border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;background:var(--bg2)">'+
        '<div style="display:flex;align-items:stretch">'+
          '<div data-id="'+q.id+'" onclick="toggleSkipItem(this.dataset.id)" style="flex:1;padding:13px 14px;cursor:pointer;min-width:0">'+
            '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">'+
              '<strong style="color:var(--warn);font-size:13px">'+(q.allSrcs?q.allSrcs.join(' · '):q.src)+' Q'+q.qnum+'</strong>'+
              '<span style="font-size:11px;color:var(--text3)">'+q.cat+'</span>'+
              '<span id="sia-'+q.id+'" style="color:var(--accent2);font-size:18px;margin-left:auto;transition:transform .25s;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--bg3);flex-shrink:0">▾</span>'+
            '</div>'+
            '<div style="font-size:13px;color:var(--text2);line-height:1.5;word-break:break-word">'+escHtml(q.stem.substring(0,80))+(q.stem.length>80?'…':'')+'</div>'+
          '</div>'+
          '<button data-id="'+q.id+'" onclick="unskip(this.dataset.id)" style="flex-shrink:0;border-radius:0;border:none;border-left:1px solid var(--border);padding:0 14px;margin:0;writing-mode:vertical-lr;font-size:12px;letter-spacing:.05em;background:rgba(239,68,68,.1);color:var(--danger);cursor:pointer">해제</button>'+
        '</div>'+
        '<div id="sib-'+q.id+'" data-id="'+q.id+'" onclick="toggleSkipItem(this.dataset.id)" style="display:none;border-top:1px solid var(--border);padding:14px;cursor:pointer"></div>'+
      '</div>'
    ).join('');
  }
  document.getElementById('skip-screen').style.display='flex';
}
function toggleSkipItem(id){
  const body=document.getElementById('sib-'+id);
  const arrow=document.getElementById('sia-'+id);
  if(!body)return;
  const isOpen=body.style.display!=='none';
  document.querySelectorAll('[id^="sib-"]').forEach(b=>b.style.display='none');
  document.querySelectorAll('[id^="sia-"]').forEach(a=>a.style.transform='');
  if(isOpen)return;
  const q=ALL_QS.find(q=>q.id===id);
  if(!q)return;
  const L=['A','B','C','D'];
  body.innerHTML=
    '<div style="font-size:15px;line-height:1.75;color:var(--text);margin-bottom:14px">'+escHtml(q.stem)+'</div>'+
    q.opts.filter(o=>o).map((o,i)=>
      '<div style="display:flex;gap:9px;padding:10px 12px;border:1.5px solid '+(i===q.answer?'var(--success)':'var(--border)')+
      ';border-radius:9px;background:'+(i===q.answer?'var(--success-bg)':'var(--bg)')+';margin-bottom:7px">'+
      '<span style="min-width:21px;height:21px;border-radius:50%;background:'+(i===q.answer?'var(--success)':'var(--bg3)')+
      ';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:'+(i===q.answer?'#fff':'var(--text2)')+';flex-shrink:0">'+L[i]+'</span>'+
      '<span style="font-size:14px;line-height:1.5;color:'+(i===q.answer?'var(--success)':'var(--text)')+'">'+escHtml(o)+'</span>'+
      '</div>').join('');
  body.style.display='block';
  arrow.style.transform='rotate(180deg)';
  setTimeout(()=>document.getElementById('si-'+id).scrollIntoView({behavior:'smooth',block:'start'}),60);
}
function closeSkipScreen(){document.getElementById('skip-screen').style.display='none';updateBtn();}
function unskip(id){
  store.skip.delete(id);saveStore();
  openSkipScreen();updateBtn();
}
function nextQ(){
  // Wrong 모드에서 방금 맞춘 문제는 세션 목록에서 제거
  if(mode==='wr'&&sessQs[qIdx]?._removeFromWr){
    sessQs.splice(qIdx,1);
    if(!sessQs.length){
      // 다 맞췄으면 결과 표시
      alert('🎉 오답 목록을 모두 맞췄습니다!');
      goHome();return;
    }
    if(qIdx>=sessQs.length)qIdx=sessQs.length-1;
    answered=false;sessionAnswers={};showQ();return;
  }
  // 일반 다음 문제 로직
  if(qIdx+1>=sessQs.length){showResult();return;}qIdx++;showQ();}
function toggleBm(){const q=sessQs[qIdx];store.bm.has(q.id)?store.bm.delete(q.id):store.bm.add(q.id);saveStore();updateStats();const bm=document.getElementById('btn-bm');bm.textContent=store.bm.has(q.id)?'★':'☆';bm.classList.toggle('on',store.bm.has(q.id));}
function showResult(){clearInterval(timerIv);const tot=sessQs.length,pct=Math.round(sCorrect/tot*100);document.getElementById('res-score').textContent=sCorrect+'/'+tot;document.getElementById('res-label').textContent=pct+'% correct · '+sWrong+' wrong';document.getElementById('bar-c').style.width=(sCorrect/tot*100)+'%';document.getElementById('bar-w').style.width=(sWrong/tot*100)+'%';document.getElementById('num-c').textContent=sCorrect;document.getElementById('num-w').textContent=sWrong;document.getElementById('btn-rw').style.display=sWrong?'':'none';document.getElementById('prog').style.width='100%';updateStats();showScreen('result');}
function retrySame(){const qs=[...sessQs];if(order==='rand')qs.sort(()=>Math.random()-.5);sessQs=qs;qIdx=0;sCorrect=0;sWrong=0;sWrongIds=[];seenQIds=new Set();sessStartTime=Date.now();sessionAnswers={};answered=false;showScreen('quiz');showQ();}
function retryWrong(){const wqs=ALL_QS.filter(q=>sWrongIds.includes(q.id));if(!wqs.length)return;sessQs=wqs;qIdx=0;sCorrect=0;sWrong=0;sWrongIds=[];seenQIds=new Set();sessStartTime=Date.now();sessionAnswers={};answered=false;showScreen('quiz');showQ();}
function goHome(){clearInterval(timerIv);updateStats();showScreen('home');updateBtn();}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
window.onload=()=>{loadStore();initAuth();};

});
